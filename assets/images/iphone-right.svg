<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- iPhone frame -->
  <rect x="10" y="10" width="180" height="380" rx="20" fill="#000" stroke="#333" stroke-width="2"/>
  
  <!-- Notch -->
  <rect x="70" y="10" width="60" height="25" rx="0" fill="#000"/>
  
  <!-- Screen -->
  <rect x="15" y="35" width="170" height="350" rx="15" fill="#6D28D9"/>
  
  <!-- Content -->
  <text x="100" y="150" font-size="40" text-anchor="middle" fill="#fff">📊</text>
  <text x="100" y="200" font-size="16" text-anchor="middle" fill="#fff" font-weight="bold">Analytics</text>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="screenGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="15" y="35" width="170" height="350" rx="15" fill="url(#screenGradient2)" opacity="0.3"/>
</svg>